<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Connecting to Zoho…</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8fafc; color: #1e293b; }
    .box { text-align: center; }
    .spinner { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: #64748b; }
    .error { color: #dc2626; font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p id="msg">Saving Zoho session…</p>
  <div class="error" id="err"></div>
</div>
<script>
  (function () {
    const hash = window.location.hash;

    // ── DEBUG: show raw hash ──────────────────────────────
    const dbg = document.createElement('pre');
    dbg.style.cssText = 'font-size:11px;background:#f1f5f9;padding:10px 14px;border-radius:6px;margin-top:16px;max-width:560px;word-break:break-all;text-align:left;color:#334155;';
    dbg.textContent = 'Hash: ' + (hash || '(empty)');
    document.querySelector('.box').appendChild(dbg);
    // ─────────────────────────────────────────────────────

    if (!hash || !hash.includes('access_token')) {
      document.getElementById('msg').textContent = 'No token found in URL.';
      document.getElementById('err').textContent = 'Zoho did not return an access token. Screenshot this page and share it.';
      return;
    }

    const params     = new URLSearchParams(hash.replace(/^#/, ''));
    const token      = params.get('access_token');
    const expiresIn  = parseInt(params.get('expires_in') || '3600', 10);
    const expiresAt  = Date.now() + expiresIn * 1000;

    // Map Zoho location → dc key used by the proxy
    const LOCATION_DC = { us: 'com', eu: 'eu', in: 'in', au: 'com.au', jp: 'jp', ca: 'ca' };
    const location    = params.get('location') || 'in';
    const dc          = LOCATION_DC[location] || 'com';

    dbg.textContent += '\ntoken: ' + (token ? token.slice(0,12) + '…' : 'MISSING');
    dbg.textContent += '\nexpires_in: ' + expiresIn + 's';
    dbg.textContent += '\nexpiresAt: ' + new Date(expiresAt).toLocaleTimeString();
    dbg.textContent += '\nnow:       ' + new Date().toLocaleTimeString();
    dbg.textContent += '\nlocation:  ' + location + ' → dc=' + dc;

    if (!token) {
      document.getElementById('err').textContent = 'Could not extract access token.';
      return;
    }

    const session = { accessToken: token, expiresAt, dc };

    try {
      localStorage.setItem('cm_z_sess', JSON.stringify(session));
      dbg.textContent += '\n✅ Saved to localStorage';
      document.getElementById('msg').textContent = 'Connected! Redirecting in 3s…';
    } catch (e) {
      document.getElementById('err').textContent = 'Could not save session: ' + e.message;
      return;
    }

    setTimeout(() => window.location.replace('/'), 3000);
  })();
</script>
</body>
</html>
